  <script>
async function getLiveScore() {
  try {
    const response = await fetch("https://api.cricapi.com/v1/currentMatches?apikey=93de34b6-ca9c-439e-b485-f614acd7299c&offset=0");
    const data = await response.json();

    if (data.data && data.data.length > 0) {
      const match = data.data[0];

      document.getElementById("liveScore").innerHTML = `
        <h3>${match.name}</h3>
        <p>Status: ${match.status}</p>
        <p>Score: ${match.score ? match.score[0].r + "/" + match.score[0].w + " (" + match.score[0].o + ")" : "Not available"}</p>
      `;
    } else {
      document.getElementById("liveScore").innerHTML = "No live matches right now.";
    }
  } catch (error) {
    document.getElementById("liveScore").innerHTML = "Error loading live score.";
  }
}

getLiveScore();
setInterval(getLiveScore, 30000); // auto refresh every 30 seconds
</script>

<script>
let runs = 245;
let wickets = 6;
let balls = 3; 

function updateScore(){
  runs += Math.floor(Math.random()*6);
  
  if(Math.random() < 0.15){
    wickets += 1;
  }

  balls++;
  if(balls >= 6){
    balls = 0;
  }

  document.querySelector(".score").innerText =
  "India " + runs + "/" + wickets + " (42." + balls + ")";
}

setInterval(updateScore, 3000);
</script>
